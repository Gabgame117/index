<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gabgame Pokémon</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
padding:10px 18px;
margin:6px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

#menu,#combat,#boutique,#inventaire,#don{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

canvas{
background:#4ec5f1;
display:none;
margin:auto;
}

#joystick{
position:absolute;
bottom:30px;
left:30px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.15);
display:none;
touch-action:none;
}

#stick{
width:50px;
height:50px;
border-radius:50%;
background:white;
position:absolute;
top:35px;
left:35px;
}

</style>
</head>

<body>

<div id="menu">

<h1>🎮 Gabgame Pokémon</h1>

<button onclick="startGame()">Démarrer</button><br>
<button onclick="openShop()">Boutique</button><br>
<button onclick="openInventory()">Inventaire</button><br>
<button onclick="openDon()">Don</button>

</div>

<canvas id="game" width="600" height="500"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<div id="combat" style="display:none">

<h2 id="enemyName"></h2>

<p id="combatStats"></p>

<div id="attackButtons"></div>

<button onclick="usePotion()">Potion</button>

<button onclick="exitCombat()">Fuir</button>

</div>

<div id="boutique" style="display:none">
<h2>Boutique</h2>
<p>Argent : <span id="moneyDisplay">0</span></p>
<button onclick="buyPotion()">Potion +30PV (20)</button><br>
<button onclick="returnMenu()">Retour</button>
</div>

<div id="inventaire" style="display:none">
<h2>Inventaire</h2>
<p id="inventoryText">Potions : 0</p>
<button onclick="returnMenu()">Retour</button>
</div>

<div id="don" style="display:none">
<h2>Merci pour ton soutien ❤️</h2>
<button onclick="returnMenu()">Retour</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let player={x:300,y:250,size:20}
let speed={x:0,y:0}

let pokemons=[
{name:"Salamèche",x:120,y:120,size:20,color:"orange"},
{name:"Caninos",x:480,y:200,size:20,color:"brown"},
{name:"Ponyta",x:300,y:420,size:20,color:"yellow"}
]

let money=0
let potions=0

let playerHP=100
let enemyHP=0
let enemy=""
let fighting=false
let currentEnemy=null

function startGame(){

hideAll()

canvas.style.display="block"
document.getElementById("joystick").style.display="block"

requestAnimationFrame(gameLoop)

}

function hideAll(){

document.getElementById("menu").style.display="none"
document.getElementById("combat").style.display="none"
document.getElementById("boutique").style.display="none"
document.getElementById("inventaire").style.display="none"
document.getElementById("don").style.display="none"

}

function gameLoop(){

if(!fighting){

ctx.clearRect(0,0,canvas.width,canvas.height)

player.x+=speed.x
player.y+=speed.y

player.x=Math.max(0,Math.min(canvas.width,player.x))
player.y=Math.max(0,Math.min(canvas.height,player.y))

ctx.fillStyle="red"
ctx.fillRect(player.x-10,player.y-10,20,20)

pokemons.forEach(p=>{

ctx.fillStyle=p.color
ctx.fillRect(p.x-10,p.y-10,20,20)

if(Math.abs(player.x-p.x)<20 && Math.abs(player.y-p.y)<20){

startCombat(p)

}

})

}

requestAnimationFrame(gameLoop)

}

function startCombat(p){

fighting=true

currentEnemy=p

enemy=p.name

enemyHP=100
playerHP=100

canvas.style.display="none"

document.getElementById("combat").style.display="block"
document.getElementById("enemyName").innerText="Combat contre "+enemy

createAttacks()

updateCombat()

}

function createAttacks(){

const div=document.getElementById("attackButtons")
div.innerHTML=""

let attacks=["Attaque 1","Attaque 2","Attaque 3"]

attacks.forEach(a=>{

let b=document.createElement("button")
b.innerText=a

b.onclick=()=>attack()

div.appendChild(b)

})

}

function attack(){

let dmg=Math.floor(Math.random()*20)+10
enemyHP-=dmg

if(enemyHP<=0){

money+=20

alert("Victoire ! +20")

removeEnemy()

exitCombat()

return

}

let counter=Math.floor(Math.random()*15)+5
playerHP-=counter

if(playerHP<=0){

alert("Tu es KO")

exitCombat()

}

updateCombat()

}

function usePotion(){

if(potions>0){

playerHP+=30
potions--

updateCombat()

}

}

function updateCombat(){

document.getElementById("combatStats").innerText=
"PV Joueur : "+playerHP+" | PV Ennemi : "+enemyHP

}

function exitCombat(){

fighting=false

document.getElementById("combat").style.display="none"

canvas.style.display="block"

}

function removeEnemy(){

pokemons=pokemons.filter(e=>e!==currentEnemy)

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp") speed.y=-3
if(e.key==="ArrowDown") speed.y=3
if(e.key==="ArrowLeft") speed.x=-3
if(e.key==="ArrowRight") speed.x=3

})

document.addEventListener("keyup",e=>{

if(e.key==="ArrowUp"||e.key==="ArrowDown") speed.y=0
if(e.key==="ArrowLeft"||e.key==="ArrowRight") speed.x=0

})

function openShop(){

hideAll()

document.getElementById("boutique").style.display="block"
updateMoney()

}

function buyPotion(){

if(money>=20){

money-=20
potions++

updateMoney()

}

}

function updateMoney(){

document.getElementById("moneyDisplay").innerText=money

}

function openInventory(){

hideAll()

document.getElementById("inventaire").style.display="block"

document.getElementById("inventoryText").innerText=
"Potions : "+potions

}

function openDon(){

hideAll()

document.getElementById("don").style.display="block"

}

function returnMenu(){

canvas.style.display="none"
document.getElementById("joystick").style.display="none"

document.getElementById("menu").style.display="block"

}

const stick=document.getElementById("stick")
const base=document.getElementById("joystick")

let drag=false

base.addEventListener("touchstart",()=>drag=true)

base.addEventListener("touchmove",e=>{

if(!drag)return

let rect=base.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left-60
let y=e.touches[0].clientY-rect.top-60

stick.style.transform=`translate(${x}px,${y}px)`

speed.x=x/15
speed.y=y/15

})

base.addEventListener("touchend",()=>{

drag=false

stick.style.transform=""

speed.x=0
speed.y=0

})

</script>

</body>
</html>
