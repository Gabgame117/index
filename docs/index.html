<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gabgame Pokémon 3D GO-like</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.5/dist/leaflet.css"/>
<style>
body{margin:0;font-family:Arial;overflow:hidden;}
#menu,#combat,#boutique,#inventaire,#don{display:none;text-align:center;}
#menu{font-size:24px;padding-top:20px;}
#map{position:absolute;top:0;left:0;right:0;bottom:0;}
button{padding:8px 14px;margin:5px;border-radius:8px;font-size:16px;cursor:pointer;}
#joystick{position:absolute;bottom:20px;left:20px;width:120px;height:120px;border-radius:50%;background:rgba(0,0,0,0.2);touch-action:none;}
#stick{position:absolute;top:35px;left:35px;width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,0.5);}
canvas{pointer-events:none;}
</style>
</head>
<body>

<h1 style="text-align:center;">🎮 Gabgame Pokémon 3D</h1>

<div id="menu">
  <button onclick="demarrer()">🎴 Démarrer</button><br>
  <button onclick="ouvrirBoutique()">🏪 Boutique</button><br>
  <button onclick="ouvrirInventaire()">🗂 Inventaire</button><br>
  <button onclick="ouvrirDon()">💖 Faire un don</button>
</div>

<div id="map"></div>
<div id="joystick"><div id="stick"></div></div>

<div id="combat">
  <h2 id="combatTitre"></h2>
  <p id="combatPv"></p>
  <div id="attaques"></div>
  <button onclick="utiliserPotion()">🍶 Utiliser Potion</button>
  <button onclick="quitterCombat()">⬅ Retour Carte</button>
</div>

<div id="boutique"><p>💰 Argent : <span id="argentBoutique">0</span></p><button onclick="retourMenu()">⬅ Menu</button></div>
<div id="inventaire"><p id="listePokemons">Aucun Pokémon</p><button onclick="retourMenu()">⬅ Menu</button></div>
<div id="don"><button onclick="retourMenu()">⬅ Menu</button></div>

<script src="https://unpkg.com/leaflet@1.9.5/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/three/examples/js/renderers/CSS3DRenderer.js"></script>

<script>
// === VARIABLES JEU ===
let argent=0, joueurEquipe=[], pokemonsSurCarte=[], combatEnCours=false;
let joueurPV=0, ennemiPV=0, ennemiNom="";
let scene, camera, renderer, pokemonMeshes=[];

// Pokémon de base avec image pour 3D
const pokemonsBase={
  "Salamèche":"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png",
  "Caninos":"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/58.png",
  "Ponyta":"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/77.png"
};

// === INITIALISER LEAFLET ===
const map = L.map('map').setView([44.83779, -0.57918], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

// === JOYSTICK MOBILE ===
const stick=document.getElementById("stick"), base=document.getElementById("joystick");
let move={x:0,y:0}, dragging=false;
base.addEventListener("touchstart",e=>{dragging=true;});
base.addEventListener("touchmove", e=>{
  if(!dragging) return;
  let rect=base.getBoundingClientRect();
  let x=(e.touches[0].clientX-rect.left-60);
  let y=(e.touches[0].clientY-rect.top-60);
  stick.style.transform=`translate(${x}px,${y}px)`;
  move.x = x/40; move.y = y/40;
});
base.addEventListener("touchend",()=>{dragging=false;stick.style.transform=""; move.x=0; move.y=0;});

// === PLACER DES POKÉMON SUR LA CARTE (3D) ===
const positions=[
  [44.838,-0.579],
  [44.836,-0.578],
  [44.837,-0.577]
]; 

// Initialiser Three.js pour les Pokémon
scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight,0.1,1000);
renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('map').appendChild(renderer.domElement);

// Ajouter Pokémon en 3D comme cubes texturés
positions.forEach((pos,i)=>{
  let nom = Object.keys(pokemonsBase)[i];
  pokemonsSurCarte.push({nom,position:pos});

  let texture = new THREE.TextureLoader().load(pokemonsBase[nom]);
  let geometry = new THREE.BoxGeometry(0.001,0.001,0.001); // taille ajustée GPS
  let material = new THREE.MeshBasicMaterial({map:texture});
  let cube = new THREE.Mesh(geometry,material);
  cube.position.set(pos[1],0,pos[0]); // lng=x, lat=z
  scene.add(cube);
  pokemonMeshes.push({nom,cube,pos});
});

// === DÉPLACEMENT PERSONNAGE / SIMULATION ===
let playerPos={lat:44.83779,lng:-0.57918};
function deplacerPerso(){
  playerPos.lat += move.y*0.0002;
  playerPos.lng += move.x*0.0002;
  map.setView([playerPos.lat,playerPos.lng]);

  if(combatEnCours){
    requestAnimationFrame(deplacerPerso);
    return;
  }

  // Vérifier collision Pokémon
  pokemonMeshes.forEach(p=>{
    let dist = Math.hypot(playerPos.lat - p.pos[0], playerPos.lng - p.pos[1]);
    if(dist<0.0005 && !combatEnCours) commencerCombat(p.nom);
  });

  // Update caméra Three.js
  camera.position.set(playerPos.lng,0,playerPos.lat);
  camera.lookAt(new THREE.Vector3(playerPos.lng,0,playerPos.lat+0.001));
  renderer.render(scene,camera);

  requestAnimationFrame(deplacerPerso);
}

// === DÉMARRER ===
function demarrer(){
  document.getElementById("menu").style.display="none";
  map._container.style.display="block";
  document.getElementById("joystick").style.display="block";
  deplacerPerso();
}

// === COMBAT ===
function commencerCombat(nom){
  combatEnCours = true;
  ennemiNom = nom;
  ennemiPV = 100;
  joueurPV = 100;

  document.getElementById("combatTitre").innerText="Combat contre "+nom+" !";
  document.getElementById("map").style.display="none";
  document.getElementById("combat").style.display="block";
  afficherAttaques();
  updateCombat();
}

function afficherAttaques(){
  let div = document.getElementById("attaques");
  div.innerHTML = "";
  ["Attaque 1","Attaque 2","Attaque 3"].forEach(a=>{
    let b = document.createElement("button");
    b.innerText = a;
    b.onclick = ()=>attaque(a);
    div.appendChild(b);
  });
}

function attaque(a){
  let degats = Math.floor(Math.random()*20)+10;
  ennemiPV -= degats;
  if(ennemiPV<=0){
    argent+=20;
    alert(ennemiNom+" K.O ! +20 pièces");
    quitterCombat();
    return;
  }
  let contre = Math.floor(Math.random()*15)+5;
  joueurPV -= contre;
  if(joueurPV<=0) alert("Tu es K.O...");
  updateCombat();
}

function utiliserPotion(){
  if(argent>=20){
    joueurPV+=30;
    argent-=20;
    updateCombat();
  } else alert("Pas assez de pièces !");
}

function updateCombat(){
  document.getElementById("combatPv").innerText="PV "+ennemiNom+" : "+ennemiPV+" | PV Toi : "+joueurPV;
  document.getElementById("argentBoutique").innerText=argent;
}

function quitterCombat(){
  combatEnCours=false;
  document.getElementById("combat").style.display="none";
  document.getElementById("map").style.display="block";
}

// === MENU / AUTRES ===
function ouvrirBoutique(){document.getElementById("boutique").style.display="block";}
function ouvrirInventaire(){document.getElementById("inventaire").style.display="block";}
function ouvrirDon(){document.getElementById("don").style.display="block";}
function retourMenu(){
  document.getElementById("menu").style.display="block";
  document.getElementById("boutique").style.display="none";
  document.getElementById("inventaire").style.display="none";
  document.getElementById("don").style.display="none";
  document.getElementById("combat").style.display="none";
  map._container.style.display="block";
}
</script>
</body>
</html>
