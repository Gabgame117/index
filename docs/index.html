<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pokemon World</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
display:block;
margin:auto;
border:3px solid black;
background:#6ecb63;
}

button{
padding:10px;
margin:5px;
}

.screen{
display:none;
}

</style>

</head>

<body>

<div id="menu" class="screen">

<h1>Pokemon World</h1>

<button onclick="startGame()">Jouer</button>
<button onclick="show('inventory')">Inventaire</button>
<button onclick="show('shop')">Boutique</button>

</div>

<div id="game" class="screen">

<canvas id="canvas" width="800" height="500"></canvas>

<button onclick="show('menu')">Menu</button>

</div>

<div id="inventory" class="screen">

<h2>Inventaire</h2>

<p id="inv"></p>

<button onclick="show('menu')">Retour</button>

</div>

<div id="shop" class="screen">

<h2>Boutique</h2>

<button onclick="buyBall()">Pokeball (10)</button>

<button onclick="show('menu')">Retour</button>

</div>

<script src="game.js"></script>

</body>
</html>
