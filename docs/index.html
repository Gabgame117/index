<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gabgame Pokémon Ultime + 3D Mobile</title>
<style>
body{margin:0;font-family:Arial;background:#e0f7ff;text-align:center;overflow:hidden;}
button{padding:10px 20px;margin:5px;font-size:16px;cursor:pointer;border-radius:8px;}
#game,#boutique,#don,#inventaire,#carte3d{display:none;}
#menu{font-size:24px;}
#overlay{position:absolute;width:100%;text-align:center;color:black;font-size:18px;padding-top:10px;font-family:Arial;}
canvas{display:block;}
#joystick{position:absolute;bottom:20px;left:20px;width:120px;height:120px;border-radius:50%;background:rgba(0,0,0,0.2);touch-action:none;}
#stick{position:absolute;top:35px;left:35px;width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,0.5);}
</style>
</head>
<body>

<h1>🎮 Gabgame Pokémon Ultime</h1>

<!-- MENU -->
<div id="menu">
<h2>Menu</h2>
<button onclick="choixPokemon()">🎴 Choisir Pokémon</button>
<button onclick="ouvrirBoutique()">🏪 Boutique</button>
<button onclick="ouvrirInventaire()">🗂 Inventaire</button>
<button onclick="ouvrirDon()">💖 Faire un don</button>
<button onclick="ouvrirCarte3D()">🗺️ Carte 3D</button>
</div>

<!-- JEU -->
<div id="game">
<h2 id="titre"></h2>
<img id="pokemonImg" style="width:100px;height:100px;">
<img id="ennemiImg" style="width:100px;height:100px;">
<p id="pv"></p>
<div id="attaques"></div>
<p id="result"></p>
<p id="argent"></p>
<div id="map"></div>
<br>
<button onclick="retourMenu()">⬅ Retour menu</button>
</div>

<!-- BOUTIQUE -->
<div id="boutique">
<h2>🏪 Boutique</h2>
<p>💰 Argent : <span id="argentBoutique">0</span></p>
<button onclick="acheter('Potion')">Potion - 20 pièces</button>
<button onclick="acheter('Super Potion')">Super Potion - 50 pièces</button>
<br><br>
<button onclick="retourMenu()">⬅ Retour menu</button>
</div>

<!-- INVENTAIRE -->
<div id="inventaire">
<h2>🗂 Inventaire Pokémon</h2>
<p id="listePokemons">Aucun Pokémon capturé</p>
<br>
<button onclick="retourMenu()">⬅ Retour menu</button>
</div>

<!-- DON -->
<div id="don">
<h2>💖 Soutien</h2>
<p>Si tu veux soutenir le jeu :</p>
<a href="#" target="_blank"><button>Faire un don</button></a>
<br><br>
<button onclick="retourMenu()">⬅ Retour menu</button>
</div>

<!-- CARTE 3D -->
<div id="carte3d">
<div id="overlay">
<p>Flèches ou joystick pour se déplacer 🎮</p>
</div>
<div id="joystick"><div id="stick"></div></div>
<br>
<button onclick="retourMenu()">⬅ Retour menu</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ===== VARIABLES JEU =====
let joueurPV, ennemiPV, joueur, ennemi, attaques, argent=0;
let pokemonsPossedes=[];
const mapSize=5;
const pokemons={
"Salamèche":{attaques:["Flamme","Griffe","Croc Feu"], img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png"},
"Dracaufeu":{attaques:["Lance-flammes","Draco-Queue","Croc Feu"], img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png"},
"Caninos":{attaques:["Morsure","Flamme","Charge"], img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/58.png"},
"Ponyta":{attaques:["Charge","Ruade","Flamme"], img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/77.png"}
};
const ennemis={"Aquagon":"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png"};

// ===== MENU =====
const menuHTML = `
<h2>Menu</h2>
<button onclick="choixPokemon()">🎴 Choisir Pokémon</button>
<button onclick="ouvrirBoutique()">🏪 Boutique</button>
<button onclick="ouvrirInventaire()">🗂 Inventaire</button>
<button onclick="ouvrirDon()">💖 Faire un don</button>
<button onclick="ouvrirCarte3D()">🗺️ Carte 3D</button>
`;

// ===== CHOIX POKÉMON =====
function choixPokemon(){
  let menu=document.getElementById("menu");
  menu.innerHTML="<h2>Choisis ton Pokémon :</h2>";
  Object.keys(pokemons).forEach(p=>{
    let b=document.createElement("button");
    b.innerText=p;
    b.onclick=function(){
      joueur=p;
      attaques=pokemons[joueur].attaques;
      joueurPV=100;
      menu.style.display="none";
      startGame();
    };
    menu.appendChild(b);
  });
}

// ===== JEU / MAP =====
let playerPos={x:2,y:2};
function startGame(){
  document.getElementById("game").style.display="block";
  drawMap();
  spawnRencontre();
  updatePV();
  createAttaques();
}
function drawMap(){
  let div=document.getElementById("map");
  div.innerHTML="";
  for(let y=0;y<mapSize;y++){
    for(let x=0;x<mapSize;x++){
      let cell=document.createElement("div");
      cell.className="cell";
      if(x===playerPos.x && y===playerPos.y) cell.classList.add("player");
      div.appendChild(cell);
    }
    div.appendChild(document.createElement("br"));
  }
}

// ===== DEPLACEMENT =====
document.addEventListener("keydown",function(e){
  if(document.getElementById("game").style.display==="block"){
    if(e.key==="ArrowUp") playerPos.y=Math.max(0,playerPos.y-1);
    if(e.key==="ArrowDown") playerPos.y=Math.min(mapSize-1,playerPos.y+1);
    if(e.key==="ArrowLeft") playerPos.x=Math.max(0,playerPos.x-1);
    if(e.key==="ArrowRight") playerPos.x=Math.min(mapSize-1,playerPos.x+1);
    drawMap();
    if(Math.random()<0.3) spawnRencontre();
  }
});

// ===== RENCONTRE =====
function spawnRencontre(){
  if(Math.random()<0.5){
    ennemi="Aquagon";
    ennemiPV=100;
    document.getElementById("titre").innerHTML="Rencontre ! "+ennemi+" apparait !";
    document.getElementById("pokemonImg").src=pokemons[joueur].img;
    document.getElementById("ennemiImg").src=ennemis[ennemi];
  } else {
    let sauvage="Ponyta";
    if(!pokemonsPossedes.includes(sauvage)){
      pokemonsPossedes.push(sauvage);
      alert("🎉 Tu as capturé "+sauvage+" !");
    }
  }
}

// ===== ATTAQUES =====
function createAttaques(){
  let div=document.getElementById("attaques");
  div.innerHTML="";
  attaques.forEach(a=>{
    let b=document.createElement("button");
    b.innerText=a;
    b.onclick=function(){attaque(a)};
    div.appendChild(b);
  });
}
function attaque(a){
  if(!ennemi) return;
  let dJ=Math.floor(Math.random()*30)+10;
  ennemiPV-=dJ;
  let txt=joueur+" utilise "+a+" ! "+dJ+" dégâts<br>";
  if(ennemiPV<=0){
    let gain=Math.floor(Math.random()*50)+20;
    argent+=gain;
    document.getElementById("result").innerHTML=txt+ennemi+" K.O ! Tu gagnes "+gain+" pièces";
    updatePV();
    ennemi=null;
    return;
  }
  let dE=Math.floor(Math.random()*25)+10;
  joueurPV-=dE;
  txt+=ennemi+" attaque ! "+dE+" dégâts";
  if(joueurPV<=0) txt+="<br>"+joueur+" K.O 😢";
  document.getElementById("result").innerHTML=txt;
  updatePV();
}
function updatePV(){
  document.getElementById("pv").innerHTML=joueur+" PV : "+joueurPV+" | "+(ennemi||"Aucun")+(ennemi? " PV : "+ennemiPV:"");
  document.getElementById("argent").innerHTML="💰 Argent : "+argent;
  document.getElementById("argentBoutique").innerText=argent;
}

// ===== BOUTIQUE =====
function ouvrirBoutique(){
  document.getElementById("menu").style.display="none";
  document.getElementById("boutique").style.display="block";
}
function acheter(item){
  if(item=="Potion" && argent>=20){joueurPV+=30; argent-=20; alert("Potion utilisée ! +30 PV");}
  else if(item=="Super Potion" && argent>=50){joueurPV+=70; argent-=50; alert("Super Potion utilisée ! +70 PV");}
  else alert("Pas assez d'argent !");
  updatePV();
}

// ===== INVENTAIRE =====
function ouvrirInventaire(){
  document.getElementById("menu").style.display="none";
  document.getElementById("inventaire").style.display="block";
  if(pokemonsPossedes.length===0) document.getElementById("listePokemons").innerText="Aucun Pokémon capturé";
  else document.getElementById("listePokemons").innerText=pokemonsPossedes.join(", ");
}

// ===== PAGE DON =====
function ouvrirDon(){
  document.getElementById("menu").style.display="none";
  document.getElementById("don").style.display="block";
}

// ===== CARTE 3D + JOYSTICK =====
let scene,camera,renderer,controls,pokemonModel3D;
let move={forward:false,backward:false,left:false,right:false},speed=0.1;

function ouvrirCarte3D(){
  document.getElementById("menu").style.display="none";
  document.getElementById("carte3d").style.display="block";
  init3D();
}

function init3D(){
  if(scene) return;
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x87CEEB);
  camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  document.getElementById("carte3d").appendChild(renderer.domElement);

  controls=new THREE.PointerLockControls(camera,renderer.domElement);
  document.body.addEventListener('click',()=>{controls.lock();});
  scene.add(controls.getObject());

  const floor=new THREE.Mesh(new THREE.PlaneGeometry(200,200),new THREE.MeshBasicMaterial({color:0x228B22}));
  floor.rotation.x=-Math.PI/2;
  scene.add(floor);

  const light=new THREE.HemisphereLight(0xffffff,0x444444);
  light.position.set(0,200,0);
  scene.add(light);

  camera.position.set(0,2,5);

  document.addEventListener("keydown",kDown3D);
  document.addEventListener("keyup",kUp3D);

  // Pokémon modèle 3D
  const loader=new THREE.GLTFLoader();
  loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF/Duck.gltf',function(gltf){
    pokemonModel3D=gltf.scene;
    pokemonModel3D.position.set(0,0,-10);
    pokemonModel3D.scale.set(3,3,3);
    scene.add(pokemonModel3D);
  });

  // Joystick mobile
  initJoystick();

  animate3D();
}

function kDown3D(e){if(e.code==="KeyW"||e.code==="ArrowUp") move.forward=true; if(e.code==="KeyS"||e.code==="ArrowDown") move.backward=true; if(e.code==="KeyA"||e.code==="ArrowLeft") move.left=true; if(e.code==="KeyD"||e.code==="ArrowRight") move.right=true;}
function kUp3D(e){if(e.code==="KeyW"||e.code==="ArrowUp") move.forward=false; if(e.code==="KeyS"||e.code==="ArrowDown") move.backward=false; if(e.code==="KeyA"||e.code==="ArrowLeft") move.left=false; if(e.code==="KeyD"||e.code==="ArrowRight") move.right=false;}

function animate3D(){
  requestAnimationFrame(animate3D);
  const dir=new THREE.Vector3();
  if(move.forward) dir.z-=speed;
  if(move.backward) dir.z+=speed;
  if(move.left) dir.x-=speed;
  if(move.right) dir.x+=speed;
  controls.moveRight(dir.x);
  controls.moveForward(dir.z);
  renderer.render(scene,camera);
}

// ===== JOYSTICK =====
function initJoystick(){
  const stick=document.getElementById("stick");
  const base=document.getElementById("joystick");
  let origin={x:0,y:0};
  let dragging=false;

  const getDir=e=>{
    let rect=base.getBoundingClientRect();
    let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left-60;
    let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top-60;
    let dist=Math.sqrt(x*x+y*y);
    let max=40; if(dist>max){x=x*max/dist;y=y*max/dist;}
    stick.style.transform=`translate(${x}px,${y}px)`;
    move.forward=y<-5; move.backward=y>5; move.left=x<-5; move.right=x>5;
  };

  base.addEventListener("touchstart", e=>{dragging=true; getDir(e); e.preventDefault();});
  base.addEventListener("touchmove", e=>{if(dragging)getDir(e);});
  base.addEventListener("touchend", e=>{dragging=false;stick.style.transform="translate(0px,0px)"; move.forward=false;move.backward=false;move.left=false;move.right=false;});
  base.addEventListener("mousedown", e=>{dragging=true; getDir(e);});
  document.addEventListener("mousemove", e=>{if(dragging)getDir(e);});
  document.addEventListener("mouseup", e=>{dragging=false; stick.style.transform="translate(0px,0px)"; move.forward=false;move.backward=false;move.left=false;move.right=false;});
}

// ===== RETOUR MENU =====
function retourMenu(){
  document.getElementById("game").style.display="none";
  document.getElementById("boutique").style.display="none";
  document.getElementById("don").style.display="none";
  document.getElementById("inventaire").style.display="none";
  document.getElementById("carte3d").style.display="none";
  let menu=document.getElementById("menu");
  menu.innerHTML=menuHTML;
  menu.style.display="block";
}
</script>

</body>
</html>
