<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Pokemon World</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.1/dist/nipplejs.min.js"></script>

</head>

<body>

<div id="login">

<h2>Connexion</h2>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>

</div>


<div id="menu">

<button onclick="openInventory()">Inventaire</button>
<button onclick="openShop()">Boutique</button>
<button onclick="openTeam()">Mes Pokémon</button>
<button onclick="openPokedex()">Pokédex</button>

<span id="money"></span>

</div>


<div id="shop">

<h2>Boutique</h2>

<button onclick="buyBall()">Pokéball (10)</button>

<button onclick="closeShop()">Fermer</button>

</div>


<div id="team">

<h2>Choisir Pokémon</h2>

<div id="pokemonList"></div>

<button onclick="closeTeam()">Fermer</button>

</div>


<div id="pokedex">

<h2>Pokédex</h2>

<div id="pokedexList"></div>

<button onclick="closePokedex()">Fermer</button>

</div>


<div id="game">

<div id="joystick"></div>

<div id="battle">

<h3 id="playerName"></h3>

<div class="hp">
<div id="playerHP"></div>
</div>

<h2 id="enemyName"></h2>

<div class="hp">
<div id="enemyHP"></div>
</div>

<img id="enemySprite">

<button onclick="attack()">Attaquer</button>
<button onclick="throwBall()">Pokéball</button>
<button onclick="run()">Fuir</button>

</div>

</div>

<script src="supabase.js"></script>
<script src="pokemon.js"></script>
<script src="game.js"></script>

</body>
</html>
