<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jeu de Pokémon</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
margin:0;
}

.screen{
display:none;
}

button{
padding:10px;
margin:5px;
font-size:16px;
cursor:pointer;
}

canvas{
background:#6bd3ff;
margin:auto;
display:block;
}

</style>
</head>

<body>

<div id="home" class="screen">

<h1>Jeu de Pokémon</h1>

<button onclick="show('login')">Se connecter</button>

<button onclick="playGuest()">Jouer sans compte</button>

</div>


<div id="login" class="screen">

<h2>Connexion</h2>

<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="mot de passe"><br>

<button onclick="login()">Connexion</button>

<button onclick="show('home')">Retour</button>

</div>


<div id="choose" class="screen">

<h2>Choisis ton Pokémon</h2>

<button onclick="choosePokemon('Salamèche')">Salamèche</button>

<button onclick="choosePokemon('Carapuce')">Carapuce</button>

<button onclick="choosePokemon('Bulbizarre')">Bulbizarre</button>

</div>


<div id="menu" class="screen">

<h2>Menu</h2>

<button onclick="startArena()">Jouer</button>
<button onclick="show('shop')">Boutique</button>
<button onclick="showInventory()">Inventaire</button>

<p>Argent : <span id="money"></span></p>

</div>


<div id="arena" class="screen">

<canvas id="game" width="600" height="400"></canvas>

<button onclick="show('menu')">Retour</button>

</div>


<div id="combat" class="screen">

<h2 id="enemyName"></h2>

<div id="attacks"></div>

<p id="combatStats"></p>

<button onclick="usePotion()">Potion</button>

<button onclick="exitCombat()">Fuir</button>

</div>


<div id="shop" class="screen">

<h2>Boutique</h2>

<button onclick="buyPotion()">Potion (20)</button>

<button onclick="show('menu')">Retour</button>

</div>


<div id="inventory" class="screen">

<h2>Inventaire</h2>

<p id="inv"></p>

<button onclick="show('menu')">Retour</button>

</div>


<script>

/* SUPABASE */

const SUPABASE_URL="https://tyitqidjzgoqpmuhuioq.supabase.co"

const SUPABASE_KEY="sb_publishable_dFLgsifzFbrSBDAht6qERA_UtcOHSyn"

const supabaseClient=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

/* ETAT JOUEUR */

let player={
pokemon:null,
money:0,
potions:0,
pokemons_caught:[]
}

let logged=false
let enemyHP=100
let playerHP=100

/* NAVIGATION */

function show(id){

document.querySelectorAll(".screen").forEach(s=>{
s.style.display="none"
})

document.getElementById(id).style.display="block"

}

show("home")

/* JOUER SANS COMPTE */

function playGuest(){

show("choose")

}

/* LOGIN */

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {data,error}=await supabaseClient.auth.signInWithPassword({
email:email,
password:password
})

if(error){

alert("Erreur connexion")

return
}

logged=true

loadPlayer()

}

/* CHARGER JOUEUR */

async function loadPlayer(){

const user=await supabaseClient.auth.getUser()

const {data}=await supabaseClient
.from("players")
.select("*")
.eq("id",user.data.user.id)
.single()

player=data

updateUI()

show("menu")

}

/* SAUVEGARDE */

async function savePlayer(){

if(!logged)return

const user=await supabaseClient.auth.getUser()

await supabaseClient
.from("players")
.update(player)
.eq("id",user.data.user.id)

}

/* CHOIX POKEMON */

function choosePokemon(name){

player.pokemon=name

updateUI()

show("menu")

}

/* ARENE */

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let enemy={x:300,y:200,name:"Rattata"}

function startArena(){

show("arena")

draw()

}

function draw(){

ctx.clearRect(0,0,600,400)

ctx.fillStyle="red"

ctx.fillRect(280,180,20,20)

ctx.fillStyle="yellow"

ctx.fillRect(enemy.x,enemy.y,20,20)

}

/* COMBAT */

function startCombat(){

enemyHP=100
playerHP=100

document.getElementById("enemyName").innerText="Combat contre "+enemy.name

createAttacks()

show("combat")

}

function getAttacks(){

if(player.pokemon=="Salamèche")
return ["Flammèche","Crocs Feu","Lance-Flammes"]

if(player.pokemon=="Carapuce")
return ["Pistolet à O","Morsure","Hydrocanon"]

if(player.pokemon=="Bulbizarre")
return ["Fouet Lianes","Tranch'Herbe","Canon Graine"]

}

function createAttacks(){

const div=document.getElementById("attacks")

div.innerHTML=""

getAttacks().forEach(a=>{

let b=document.createElement("button")

b.innerText=a

b.onclick=()=>attack()

div.appendChild(b)

})

}

function attack(){

let dmg=Math.floor(Math.random()*20)+10

enemyHP-=dmg

if(enemyHP<=0){

player.money+=20

player.pokemons_caught.push(enemy.name)

savePlayer()

alert("Victoire")

updateUI()

show("menu")

return

}

playerHP-=10

updateCombat()

}

function updateCombat(){

document.getElementById("combatStats").innerText=
"PV joueur "+playerHP+" | PV ennemi "+enemyHP

}

/* POTION */

function usePotion(){

if(player.potions>0){

playerHP+=30

player.potions--

savePlayer()

}

}

/* BOUTIQUE */

function buyPotion(){

if(player.money>=20){

player.money-=20

player.potions++

savePlayer()

updateUI()

}

}

/* INVENTAIRE */

function showInventory(){

document.getElementById("inv").innerText=

"Potions : "+player.potions+
"\nPokémon battus : "+player.pokemons_caught.join(",")

show("inventory")

}

/* UI */

function updateUI(){

document.getElementById("money").innerText=player.money

}

</script>

</body>
</html>
